name: valheim_launcher_generator
description: "Valheim Launcher Generator — wizard tworzący skonfigurowane launcher/patcher/updater."
publish_to: 'none'

version: 1.2.0+3

environment:
  sdk: ^3.10.0-162.1.beta

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI / State
  provider: ^6.1.2
  cupertino_icons: ^1.0.8

  # Crypto (bez encrypt - konflikt pointycastle z dartssh2)
  crypto: ^3.0.3

  # Storage
  shared_preferences: ^2.3.2
  path_provider: ^2.1.3

  # File picking
  file_picker: ^8.0.0

  # Networking (FTP/SFTP - test połączenia i build modułów)
  ftpconnect: ^2.0.10
  dartssh2: ^2.16.0

  # Archive (pakowanie outputu)
  archive: ^3.6.1

  # i18n
  intl: ^0.20.0
  image: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.24.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/backgrounds/
    - assets/locales/

  fonts:
    - family: Norse
      fonts:
        - asset: assets/fonts/Norse.otf
        - asset: assets/fonts/Norsebold.otf

flutter_launcher_icons:
  android: false
  ios: false
  image_path: "assets/images/logo.png"
  windows:
    generate: true
    image_path: "assets/images/logo.png"
    icon_size: 256
