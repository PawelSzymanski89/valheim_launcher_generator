name: server_patcher
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  ftpconnect: 2.0.10
  crypto: ^3.0.2
  shared_preferences: ^2.0.15
  dartssh2: ^2.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  process_run: ^0.12.3

flutter:
  uses-material-design: true

  assets:
    - assets/ftp.json
    - assets/patch_config.json
    - assets/img.png

flutter_launcher_icons:
  android: false
  ios: false
  image_path: "assets/img.png"
  web:
    generate: false
  windows:
    generate: true
    image_path: "assets/img.png"
    icon_size: 48 # min:48, max:256, default: 48
