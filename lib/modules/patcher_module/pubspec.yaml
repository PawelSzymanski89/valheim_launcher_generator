name: server_patcher
description: "Valheim Launcher Patcher — patcher wygenerowany przez Valheim Launcher Generator."
publish_to: 'none'

version: 1.0.6+20

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  ftpconnect: 2.0.10
  # Crypto — PBKDF2-XOR decryption (shared with generator)
  crypto: ^3.0.3
  shared_preferences: ^2.3.2
  dartssh2: ^2.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  process_run: ^0.12.3

flutter:
  uses-material-design: true

  assets:
    - assets/manifest.sig
    - assets/config_encrypted.json
    - assets/manifest.sig
    - assets/patch_config.json
    - assets/images/logo.png

flutter_launcher_icons:
  android: false
  ios: false
  image_path: "assets/images/logo.png"
  web:
    generate: false
  windows:
    generate: true
    image_path: "assets/images/logo.png"
    icon_size: 256
